<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Malin Flow</title>
  <meta name="theme-color" content="#d96c97" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar card">
      <div>
        <div class="eyebrow">Malin Flow</div>
        <h1>Veckan i korthet</h1>
      </div>
      <div class="theme-wrap">
        <label for="themeSelect">Färg</label>
        <select id="themeSelect">
          <option value="rose">Rosa</option>
          <option value="lilac">Lila</option>
          <option value="sage">Salvia</option>
          <option value="peach">Peach</option>
        </select>
      </div>
    </header>

    <main class="content">
      <section class="card hero">
        <div class="hero-row">
          <div>
            <div class="muted">Veckans fokus</div>
            <textarea id="focusInput" placeholder="Skriv ditt fokus för veckan..."></textarea>
          </div>
          <button id="saveFocusBtn" class="btn primary">Spara</button>
        </div>
      </section>

      <section class="card stats-grid">
        <div class="stat"><span class="muted">Uppgifter</span><strong id="taskCount">0</strong></div>
        <div class="stat"><span class="muted">Planer</span><strong id="planCount">0</strong></div>
        <div class="stat"><span class="muted">Kvar att leva på</span><strong id="moneyLeft">0 kr</strong></div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Uppgifter</h2>
        </div>
        <div class="inline-form">
          <input id="taskInput" type="text" placeholder="Lägg till uppgift" />
          <button id="addTaskBtn" class="btn primary">Lägg till</button>
        </div>
        <div id="taskList" class="list"></div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Veckoplan</h2>
        </div>
        <div class="grid-2">
          <input id="planTitle" type="text" placeholder="Vad ska du göra?" />
          <input id="planWhen" type="text" placeholder="Tis 18:30" />
        </div>
        <button id="addPlanBtn" class="btn primary full">Lägg till plan</button>
        <div id="planList" class="list"></div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Snabb budget</h2>
        </div>
        <div class="grid-2">
          <div>
            <label>Inkomst</label>
            <input id="incomeInput" type="number" placeholder="0" />
          </div>
          <div>
            <label>Fasta kostnader</label>
            <input id="fixedInput" type="number" placeholder="0" />
          </div>
        </div>
        <button id="saveBudgetBtn" class="btn primary full">Spara budget</button>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Synk & backup</h2>
        </div>
        <div class="sync-actions">
          <button id="exportBtn" class="btn secondary">Exportera JSON</button>
          <button id="copyBtn" class="btn secondary">Kopiera JSON</button>
        </div>
        <textarea id="syncBox" placeholder="Klistra in JSON här för att importera"></textarea>
        <div class="sync-actions">
          <button id="importBtn" class="btn primary">Importera</button>
          <button id="newWeekBtn" class="btn secondary">Ny vecka</button>
        </div>
        <div class="muted small" id="syncStatus">Ej synkad</div>
      </section>
    </main>
  </div>

  <script src="sync.js"></script>
  <script src="app.js"></script>
</body>
</html>
